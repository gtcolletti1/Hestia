# =============================================================================
# Family Hub Display — Nginx Configuration
# =============================================================================
# Reverse proxy for the backend API, WebSocket connections, and static frontend.
# =============================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # Client settings
    # -------------------------------------------------------------------------
    client_max_body_size 10M;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/plain
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Upstream: Backend API (FastAPI / Django / etc.)
    # -------------------------------------------------------------------------
    upstream backend {
        server backend:8000;
    }

    # -------------------------------------------------------------------------
    # Upstream: Frontend dev server (used during development only)
    # -------------------------------------------------------------------------
    upstream frontend {
        server frontend:80;
    }

    # =========================================================================
    # Server — HTTP (port 80)
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # — Security headers ——————————————————————————————————————————————————
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header X-XSS-Protection       "1; mode=block" always;

        # — API requests → backend ———————————————————————————————————————————
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # — WebSocket connections → backend ——————————————————————————————————
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Prevent proxy from closing idle WebSocket connections too soon
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # — Static asset caching (images, CSS, JS, fonts) ———————————————————
        location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            expires 30d;
            add_header Cache-Control "public, immutable";

            # Re-add security headers (add_header in a location block
            # overrides those from the parent server block)
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options        "SAMEORIGIN" always;
            add_header X-XSS-Protection       "1; mode=block" always;
        }

        # — Frontend (React SPA) — proxy to frontend container ————————————
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

