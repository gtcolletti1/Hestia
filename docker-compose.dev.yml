version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - familyhub

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - familyhub

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - familyhub

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    command: celery -A app.tasks worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - familyhub

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    command: celery -A app.tasks beat --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - familyhub

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build
    command: npx vite dev --host 0.0.0.0 --port 3000
    environment:
      - VITE_API_TARGET=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "3000:3000"
    networks:
      - familyhub

volumes:
  pgdata:

networks:
  familyhub:
    driver: bridge
